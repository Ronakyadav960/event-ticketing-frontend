<div class="app-shell">
<nav class="navbar">

  <div class="left">
    <button
      *ngIf="isLoggedIn && !isLoginPage && !isRegisterPage"
      class="hamburger"
      type="button"
      (click)="toggleDrawer()">
      <span class="hamburger-icon">☰</span>
    </button>

    <div class="logo" routerLink="/events">
      Event Booking
    </div>

    <div class="nav-search" *ngIf="!isLoginPage && !isRegisterPage && isEventsPage">
      <input
        class="nav-search-input"
        type="search"
        placeholder="Search events..."
        [(ngModel)]="navbarQuery"
        (ngModelChange)="onNavbarQueryChange($event)"
      />
      <button
        class="nav-search-clear"
        type="button"
        *ngIf="navbarQuery"
        (click)="clearNavbarSearch()"
        aria-label="Clear search"
      >
        ×
      </button>
    </div>
  </div>

  <div class="nav-links">

    <!-- ================= RIGHT SIDE ================= -->
    <div class="right">

      <button
        *ngIf="!isLoggedIn"
        class="login-btn"
        routerLink="/login">
        Login
      </button>

    </div>

  </div>
</nav>

<div
  *ngIf="isLoggedIn && !isLoginPage && !isRegisterPage"
  class="drawer-backdrop"
  [class.show]="isDrawerOpen"
  (click)="closeDrawer()"></div>

<aside
  *ngIf="isLoggedIn && !isLoginPage && !isRegisterPage"
  class="drawer"
  [class.open]="isDrawerOpen">

  <div class="drawer-header">
    <div class="drawer-title">Navigation</div>
  </div>

  <div class="drawer-links">
    <a
      class="drawer-link"
      routerLink="/events"
      routerLinkActive="active"
      (click)="closeDrawer()">
      Home
    </a>

    <a
      class="drawer-link"
      routerLink="/history"
      routerLinkActive="active"
      (click)="closeDrawer()">
      History
    </a>

    <a
      class="drawer-link"
      routerLink="/gifts"
      routerLinkActive="active"
      (click)="closeDrawer()">
      Gifts
    </a>

    <a
      class="drawer-link"
      routerLink="/coupons"
      routerLinkActive="active"
      (click)="closeDrawer()">
      Coupons
    </a>

    <a
      *ngIf="isCreator || isSuperAdmin"
      class="drawer-link"
      [routerLink]="isCreator ? '/creator-dashboard' : '/superadmin-dashboard'"
      routerLinkActive="active"
      (click)="closeDrawer()">
      Dashboard
    </a>

    <a
      *ngIf="canManageEvents"
      class="drawer-link"
      routerLink="/create-event"
      routerLinkActive="active"
      (click)="closeDrawer()">
      Create Event
    </a>
  </div>

  <div class="drawer-footer">
    <button
      class="drawer-logout"
      type="button"
      (click)="logout()">
      Logout
    </button>
  </div>
</aside>

<main class="app-main">
  <router-outlet></router-outlet>
</main>

<app-footer *ngIf="!isLoginPage && !isRegisterPage"></app-footer>
</div>
